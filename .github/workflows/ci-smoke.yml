name: CI Smoke

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharma_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pharma_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pharma_db?schema=public
      JWT_ACCESS_SECRET: change_me_access
      JWT_REFRESH_SECRET: change_me_refresh
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database schema
        run: npx prisma db push --accept-data-loss

      - name: Seed e2e data
        run: npm run seed:e2e

      - name: Start API
        run: npm run start:dev > /tmp/api.log 2>&1 &

      - name: Wait API healthy
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/api" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/api.log
          exit 1

      - name: Run smoke flow (Postman/Newman)
        run: npm run smoke:postman
